[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "formative"
version = "0.1.0"
requires-python = ">=3.9"
dependencies = [
    "numpy>=2,<3",
    "statsmodels>=0.14,<0.15",
    "pandas>=3,<4",
]

[dependency-groups]
dev  = ["pytest>=9,<10", "pytest-cov"]
docs = ["sphinx>=9,<10", "sphinx-rtd-theme>=3,<4", "sphinx-copybutton>=0.5,<0.6", "sphinx-autodoc-typehints>=3,<4"]

